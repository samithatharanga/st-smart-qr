<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ST Imagix Smart QR Generator</title>
    <meta name="description" content="Free Professional QR Code Generator by ST Imagix. Create custom QR codes instantly.">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg-color: #0D1117;
            --card-bg: #161B22;
            --primary: #00f3ff;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #30363d;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        h1 { margin-bottom: 5px; color: var(--primary); }
        p.subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.9rem; color: #8b949e; display: block; margin-bottom: 8px; }
        
        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 12px;
            background: #0D1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .color-picker {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0D1117;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        input[type="color"] {
            border: none; width: 40px; height: 40px; cursor: pointer; background: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 243, 255, 0.3); }

        #qr-code {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            padding: 20px;
            background: white; /* QR needs white background to scan well */
            border-radius: 10px;
            display: none; /* Hidden initially */
        }

        .download-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            margin-top: 20px;
            display: none;
        }

        .download-btn:hover { background: rgba(0, 243, 255, 0.1); }
        
        .footer { margin-top: 20px; font-size: 0.8rem; color: #8b949e; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ST Imagix QR Tool</h1>
        <p class="subtitle">Generate Custom QR Codes Instantly</p>

        <div class="input-group">
            <label>Enter URL or Text</label>
            <input type="text" id="qr-text" placeholder="https://yourwebsite.com or Text">
        </div>

        <div class="input-group">
            <label>Pick QR Color</label>
            <div class="color-picker">
                <span>Select Color</span>
                <input type="color" id="qr-color" value="#000000">
            </div>
        </div>

        <button onclick="generateQR()">Generate QR Code 🚀</button>

        <div id="qr-code"></div>

        <button class="download-btn" id="download-btn" onclick="downloadQR()">Download Image ⬇️</button>
    </div>

    <div class="footer">
        Powered by ST Imagix | No Backend Required
    </div>

    <script>
        function generateQR() {
            var text = document.getElementById("qr-text").value;
            var color = document.getElementById("qr-color").value;
            var qrContainer = document.getElementById("qr-code");
            var downloadBtn = document.getElementById("download-btn");

            if (text === "") {
                alert("Please enter text or URL!");
                return;
            }

            // Clear previous QR
            qrContainer.innerHTML = "";
            qrContainer.style.display = "flex";

            // Generate new QR
            var qrcode = new QRCode(qrContainer, {
                text: text,
                width: 200,
                height: 200,
                colorDark : color,
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            // Show download button
            setTimeout(() => {
                downloadBtn.style.display = "block";
            }, 100);
        }

        function downloadQR() {
            var qrImage = document.querySelector("#qr-code img");
            if (qrImage) {
                var link = document.createElement("a");
                link.href = qrImage.src;
                link.download = "ST-Imagix-QR.png";
                link.click();
            }
        }
    </script>

</body>
</html>
